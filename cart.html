<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belita | 結帳購物車</title>
    <style>
        :root { --primary: #8b7355; --bg: #fdfaf7; }
        * { box-sizing: border-box; font-family: 'PingFang TC', -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); color: #444; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; display: grid; gap: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(139,115,85,0.05); }
        .title { color: var(--primary); font-size: 20px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #f4f4f4; padding-bottom: 15px; }
        .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
        .cart-item img { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; background: #f9f9f9;}
        .cart-info { flex: 1; }
        .cart-info h4 { margin: 0 0 5px 0; font-size: 15px; color: #333;}
        .cart-info p { margin: 0; color: #888; font-size: 13px; }
        .cart-price { font-weight: bold; color: var(--primary); display: block; margin-top: 5px;}
        .btn-del { background: #ffebee; color: #d32f2f; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;}
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        .total-row { font-size: 18px; font-weight: bold; color: #d32f2f; margin-top: 15px; padding-top: 15px; border-top: 2px solid #f4f4f4; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555;}
        input, select { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; outline: none; background: #fafafa; transition: 0.3s;}
        input:focus, select:focus { border-color: var(--primary); background: #fff;}
        .bank-box { background: #fdfaf7; padding: 18px; border-radius: 12px; margin-bottom: 18px; font-size: 14px; border-left: 4px solid var(--primary); line-height: 1.6;}
        .btn-submit { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;}
        .btn-submit:disabled { background: #ccc; }
        .empty-cart { text-align: center; padding: 50px 20px; color: #888; }
        .notice-box { background: #fff3e0; padding: 18px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; color: #d35400; border-left: 4px solid #e67e22; }
        .notice-box ul { margin: 8px 0 0; padding-left: 20px; line-height: 1.6; color: #555; }
    </style>
</head>
<body>
    <div class="container" id="cart-container"></div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbynMF3m45iQKEsBtIaruJ1XVFq-t2kFUdvMiycw_oVOjFpxxmfrPyTccQ6pxTNz2cuR8g/exec'; 
        let finalTotal = 0; let currentSubtotal = 0;

        function renderCart() {
            const container = document.getElementById('cart-container');
            let cart = JSON.parse(localStorage.getItem('belita_cart') || '[]');
            
            if (cart.length === 0) {
                container.innerHTML = `<div class="card empty-cart"><h2>🛒 購物車是空的</h2><p>趕快去逛逛吧！</p><button type="button" class="btn-submit" onclick="location.href='index.html'" style="margin-top:15px; width:auto; padding:12px 30px;">回首頁逛逛</button></div>`;
                return;
            }

            let itemsHtml = ''; let subtotal = 0;
            cart.forEach((item, index) => {
                subtotal += item.price * item.qty;
                itemsHtml += `
                    <div class="cart-item">
                        <img src="${item.img}" onerror="this.src='https://placehold.co/400x400?text=Belita'">
                        <div class="cart-info">
                            <h4>${item.name}</h4>
                            <p>${item.spec ? '款式: '+item.spec : '標準規格'}</p>
                            <span class="cart-price">NT$ ${item.price} x ${item.qty}</span>
                        </div>
                        <!-- ✨ 加上 type="button" 並明確呼叫 window.removeItem -->
                        <button type="button" class="btn-del" onclick="window.removeItem(${index})">刪除</button>
                    </div>`;
            });

            container.innerHTML = `
                <div class="card"><div class="title">🛒 購物車明細</div>${itemsHtml}
                    <div class="row"><span>商品小計</span><span>NT$ <span id="subtotal">${subtotal}</span></span></div>
                    <div class="row"><span>運費</span><span>NT$ <span id="shipping-fee">0</span></span></div>
                    <div class="row total-row"><span>總計金額</span><span>NT$ <span id="total">${subtotal}</span></span></div>
                </div>
                <div class="card"><div class="title">📝 結帳與寄送資訊</div>
                    <form id="checkout-form">
                        <div class="form-group"><label>收件人 (暱稱 / LINE)</label><input type="text" id="combined-name" readonly required></div>
                        <div class="form-group"><label>取貨方式 (運費只算一次)</label>
                            <select id="delivery" required onchange="checkDeliveryStatus()">
                                <option value="" disabled selected data-fee="0">請選擇取貨方式</option>
                                <option value="7-11 賣貨便(+$38)" data-fee="38">7-11 賣貨便 (+$38)</option>
                                <option value="賣貨便(無法匯款，請私訊官方) (+38)" data-fee="38">賣貨便(無法匯款，請私訊官方) (+$38)</option>
                                <option value="門市自取 /面交(免運)" data-fee="0">門市自取 / 面交 (免運)</option>
                            </select>
                        </div> 
                        <div class="bank-box"><strong>🏦 匯款資訊 (無法匯款、面交免填)</strong><br>銀行：822 中國信託<br>帳號：9016-2123-2262<br>戶名：劉OO</div>
                        <div class="form-group" id="bank5-container"><label>匯款帳號後五碼</label><input type="text" id="bank5" placeholder="請輸入匯款帳號後五碼" inputmode="numeric"></div>
                        <div class="notice-box"><strong>⚠️ 購買與連線須知 (下單即表示同意)</strong><ul><li>下單需預收 $200 訂金，尾款賣貨便取貨付就可以囉！無法轉帳請私訊我們～</li><li>結帳不代表一定有貨，商品以現場實際採買數量為準。</li><li>若遇缺貨或斷貨，將另行私訊通知，並針對該商品退款。</li><li>代購服務屬委任契約，除重大瑕疵外，恕不提供退換貨。</li></ul></div>
                        <button type="submit" class="btn-submit" id="btn-submit">確認送出訂單</button>
                    </form>
                </div>`;

            const user = localStorage.getItem('belita_user'); const line = localStorage.getItem('belita_line');
            if (user && line) document.getElementById('combined-name').value = `${user} (LINE: ${line})`;
            else { alert('⚠️ 請先登入會員'); window.location.href = 'login.html'; }

            currentSubtotal = subtotal; calcTotal();
            document.getElementById('checkout-form').addEventListener('submit', (e) => submitOrder(e, cart));
        }

        function checkDeliveryStatus() {
            const sel = document.getElementById('delivery').value;
            const bBox = document.getElementById('bank5-container'); const bInput = document.getElementById('bank5');
            if (sel.includes('無法匯款') || sel.includes('面交')) { bBox.style.display = 'none'; bInput.value = sel.includes('面交') ? '面交' : '無法匯款'; } 
            else { bBox.style.display = 'block'; bInput.value = ''; }
            calcTotal();
        }

        function calcTotal() {
            const sel = document.getElementById('delivery');
            const fee = sel.options[sel.selectedIndex] ? parseInt(sel.options[sel.selectedIndex].getAttribute('data-fee') || 0) : 0;
            finalTotal = currentSubtotal + fee;
            document.getElementById('shipping-fee').innerText = fee; document.getElementById('total').innerText = finalTotal;
        }

        // ✨ 確保函數暴露到最外層，不會被瀏覽器阻擋
        window.removeItem = function(index) {
            let cart = JSON.parse(localStorage.getItem('belita_cart') || '[]'); 
            cart.splice(index, 1);
            localStorage.setItem('belita_cart', JSON.stringify(cart)); 
            renderCart();
        }

        async function submitOrder(e, cart) {
            e.preventDefault(); const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = '系統排隊處理中，請勿關閉畫面...';
            const itemsString = cart.map(item => `${item.name}${item.spec ? '('+item.spec+')' : ''} x ${item.qty}`).join(' \n');
            const sel = document.getElementById('delivery');
            try {
                const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({
                    action: 'checkout', // 加上結帳標記
                    name: document.getElementById('combined-name').value, 
                    delivery: sel.options[sel.selectedIndex].text,
                    bank5: document.getElementById('bank5').value, 
                    items: itemsString, 
                    totalAmount: finalTotal,
                    cartData: cart // 傳送購物車陣列供後端扣庫存
                })});
                const result = await res.json();
                if(result.result === 'success') { localStorage.removeItem('belita_cart'); window.location.href = 'success.html'; } 
                else { alert('下單失敗：' + (result.message || '未知錯誤')); btn.disabled = false; btn.innerText = '確認送出訂單'; }
            } catch (error) { alert('連線異常，請檢查網路'); btn.disabled = false; btn.innerText = '確認送出訂單'; }
        }
        window.onload = renderCart;
    </script>
</body>
</html>
