<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belita | 結帳購物車</title>
    <style>
        :root { --primary: #8b7355; --bg: #faf8f5; border-color: #eee; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: var(--bg); color: #444; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; display: grid; gap: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .title { color: var(--primary); font-size: 20px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* 購物車商品列表 */
        .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
        .cart-item img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; }
        .cart-info { flex: 1; }
        .cart-info h4 { margin: 0 0 5px 0; font-size: 15px; }
        .cart-info p { margin: 0; color: #888; font-size: 13px; }
        .cart-price { font-weight: bold; color: var(--primary); }
        .btn-del { background: #ffebee; color: #d32f2f; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }

        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        .total-row { font-size: 18px; font-weight: bold; color: #d32f2f; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #666;}
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; background: #fafafa;}
        .bank-box { background: #fdf6f0; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; border-left: 4px solid var(--primary); }
        
        .btn-submit { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-submit:disabled { background: #ccc; }
        .empty-cart { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="container" id="cart-container">
        <!-- 畫面由 JS 動態渲染 -->
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbynMF3m45iQKEsBtIaruJ1XVFq-t2kFUdvMiycw_oVOjFpxxmfrPyTccQ6pxTNz2cuR8g/exec'; 
        
        function renderCart() {
            const container = document.getElementById('cart-container');
            let cart = JSON.parse(localStorage.getItem('belita_cart') || '[]');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="card empty-cart">
                        <h2>🛒 購物車是空的</h2>
                        <p>趕快去逛逛吧！</p>
                        <button class="btn-submit" onclick="location.href='index.html'">去首頁逛逛</button>
                    </div>`;
                return;
            }

            let itemsHtml = '';
            let subtotal = 0;
            
            cart.forEach((item, index) => {
                subtotal += item.price * item.qty;
                itemsHtml += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div class="cart-info">
                            <h4>${item.name}</h4>
                            <p>${item.spec ? '規格: '+item.spec : ''}</p>
                            <span class="cart-price">NT$ ${item.price} x ${item.qty}</span>
                        </div>
                        <button class="btn-del" onclick="removeItem(${index})">刪除</button>
                    </div>`;
            });

            container.innerHTML = `
                <div class="card">
                    <div class="title">🛒 購物車明細</div>
                    ${itemsHtml}
                    <div class="row"><span>小計</span><span>NT$ <span id="subtotal">${subtotal}</span></span></div>
                    <div class="row"><span>運費</span><span>NT$ <span id="shipping-fee">0</span></span></div>
                    <div class="row total-row"><span>總計金額</span><span>NT$ <span id="total">${subtotal}</span></span></div>
                </div>

                <div class="card">
                    <div class="title">📝 結帳與寄送資訊</div>
                    <form id="checkout-form">
                        <div class="form-group">
                            <label>收件人 (暱稱 / LINE)</label>
                            <input type="text" id="combined-name" readonly required>
                        </div>
                        <div class="form-group">
                            <label>取貨方式 (運費只算一次，後續加單也只算一次)</label>
                            <select id="delivery" onchange="calcTotal(${subtotal})">
                                <option value="711" data-fee="38">7-11 賣貨便 (+$38)</option>
                                <option value="711" data-fee="38">賣貨便(無法匯款，請私訊官方) (+38)</option>
                                <option value="meet" data-fee="0">門市自取 / 面交 (免運)</option>
                            </select>
                        </div>
                        <div class="bank-box">
                            <strong>🏦 匯款資訊 (無法匯款 面交免填)</strong><br>
                            銀行：822 中國信託<br>帳號：9016-2123-2262<br>戶名：劉OO
                        </div>
                        <div class="form-group">
                            <label>匯款後五碼</label>
                            <input type="text" id="bank5" placeholder="輸入末 5 碼 (面交可留空)" maxlength="5" inputmode="numeric">
                        </div>
                        <button type="submit" class="btn-submit" id="btn-submit">確認送出訂單</button>
                    </form>
                </div>`;

            // 自動帶入會員資料
            const user = localStorage.getItem('belita_user');
            const line = localStorage.getItem('belita_line');
            if (user && line) {
                document.getElementById('combined-name').value = `${user} (LINE: ${line})`;
            } else {
                alert('⚠️ 請先登入會員'); window.location.href = 'login.html';
            }

            // 初次計算總額
            calcTotal(subtotal);
            
            // 綁定送出事件
            document.getElementById('checkout-form').addEventListener('submit', (e) => submitOrder(e, cart));
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('belita_cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('belita_cart', JSON.stringify(cart));
            renderCart(); // 重新渲染畫面
        }

        let finalTotal = 0;
        function calcTotal(subtotal) {
            const sel = document.getElementById('delivery');
            const fee = parseInt(sel.options[sel.selectedIndex].getAttribute('data-fee'));
            finalTotal = subtotal + fee;
            document.getElementById('shipping-fee').innerText = fee;
            document.getElementById('total').innerText = finalTotal;
            document.getElementById('bank5').required = (fee > 0); // 面交免填
        }

        async function submitOrder(e, cart) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = '訂單處理中...';

            // 將購物車陣列轉換成 GAS 能夠接收的單一字串
            const itemsString = cart.map(item => `${item.name}${item.spec ? '('+item.spec+')' : ''} x ${item.qty}`).join(' \n');
            const sel = document.getElementById('delivery');

            try {
                const response = await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify({
                        name: document.getElementById('combined-name').value,
                        delivery: sel.options[sel.selectedIndex].text,
                        bank5: document.getElementById('bank5').value,
                        items: itemsString, // 🌟 這裡把所有商品包成一包送出
                        totalAmount: finalTotal
                    }) 
                });
                const result = await response.json();
                if(result.result === 'success') {
                    localStorage.removeItem('belita_cart'); // 結帳成功，清空購物車！
                    window.location.href = 'success.html';
                } else { alert('下單失敗'); btn.disabled = false; btn.innerText = '確認送出訂單'; }
            } catch (error) { alert('連線異常'); btn.disabled = false; btn.innerText = '確認送出訂單'; }
        }

        window.onload = renderCart;
    </script>
</body>
</html>
