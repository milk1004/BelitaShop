<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belita | 商品詳情</title>
    <style>
        :root { --primary: #8b7355; --bg: #faf8f5; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: var(--bg); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-weight: bold; }
        img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; margin-bottom: 20px; background: #f9f9f9; }
        h1 { font-size: 20px; margin: 0 0 10px 0; line-height: 1.4; color: #333;}
        .price { color: var(--primary); font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555;}
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; background: #fafafa;}
        
        .qty-control { display: flex; align-items: center; gap: 15px; }
        .qty-btn { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #ccc; background: #fff; font-size: 20px; cursor: pointer; }
        input[type="number"] { width: 60px; text-align: center; border: none; font-size: 18px; font-weight: bold; }
        
        /* 按鈕群組 */
        .btn-add { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        
        /* ✨ 新增：LINE 分享按鈕樣式 */
        .btn-share-line { 
            width: 100%; 
            padding: 16px; 
            background: #06C755; /* LINE 的官方品牌綠色 */
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 12px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首頁</a>
        <img id="img" src="" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
        <h1 id="name">商品載入中...</h1>
        <div class="price" id="price">NT$ 0</div>

        <div class="form-group" id="spec-group" style="display: none;">
            <label>選擇規格</label>
            <select id="spec"></select>
        </div>

        <div class="form-group">
            <label>購買數量</label>
            <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <input type="number" id="qty" value="1" readonly>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
        </div>

        <button class="btn-add" onclick="addToCart()">🛒 加入購物車</button>
        <!-- ✨ 新增：LINE 分享按鈕 -->
        <button class="btn-share-line" onclick="shareToLine()">💬 分享給 LINE 好友</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pName = params.get('name') || '未知商品';
        const pPrice = parseInt(params.get('price')) || 0;
        const pImg = params.get('img') || '';
        const specsStr = params.get('specs') || '';

        // 渲染畫面
        document.getElementById('name').innerText = pName;
        document.getElementById('price').innerText = `NT$ ${pPrice}`;
        if(pImg) document.getElementById('img').src = pImg;

        // 處理規格
        if (specsStr) {
            document.getElementById('spec-group').style.display = 'block';
            specsStr.split(/,|，/).forEach(s => {
                if(s.trim()) document.getElementById('spec').add(new Option(s.trim(), s.trim()));
            });
        }

        function changeQty(n) {
            let input = document.getElementById('qty');
            let val = parseInt(input.value) + n;
            if(val >= 1 && val <= 20) input.value = val;
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('belita_cart') || '[]');
            let spec = specsStr ? document.getElementById('spec').value : '';
            let qty = parseInt(document.getElementById('qty').value);
            
            cart.push({ name: pName, price: pPrice, img: pImg, spec: spec, qty: qty });
            localStorage.setItem('belita_cart', JSON.stringify(cart));
            
            alert('🛒 已成功加入購物車！');
            window.location.href = 'index.html'; 
        }

// ✨ 更新：自動生成帶有圖片預覽的分享連結 (iPhone 友善版)
        function shareToLine() {
            // ⚠️ 這裡的名字改回 gasUrl，要跟下面呼叫的名字一樣！
            const gasUrl = 'https://script.google.com/macros/s/AKfycbynMF3m45iQKEsBtIaruJ1XVFq-t2kFUdvMiycw_oVOjFpxxmfrPyTccQ6pxTNz2cuR8g/exec'; 
            
            // 組裝分享給 Google 中轉站的網址
            const shareUrl = `${gasUrl}?type=share&name=${encodeURIComponent(pName)}&price=${pPrice}&img=${encodeURIComponent(pImg)}&specs=${encodeURIComponent(specsStr)}`;
            
            const message = `✨ 快來看看這個代購好物：\n【${pName}】只要 NT$ ${pPrice}！\n\n👇 點擊下方連結直接看商品 👇\n${shareUrl}`;
            
            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
            
            // ✨ 改用這行，避免 iPhone 把跳轉當成廣告擋掉
            window.location.href = lineUrl;
        }
    </script>
</body>
</html>
