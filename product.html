<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belita | 商品詳情</title>
    <style>
        :root { --primary: #8b7355; --bg: #fdfaf7; }
        * { box-sizing: border-box; font-family: 'PingFang TC', sans-serif; }
        body { margin: 0; background: var(--bg); padding: 20px; color: #333;}
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(139,115,85,0.06); }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-weight: bold; font-size: 15px;}
        img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 16px; margin-bottom: 20px; background: #f4f4f4;}
        h1 { font-size: 22px; margin: 0 0 10px 0; line-height: 1.4;}
        .price { color: var(--primary); font-size: 24px; font-weight: bold; margin-bottom: 8px; }
        .stock-tag { font-size: 14px; color: #888; margin-bottom: 25px; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555;}
        select { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; background: #fafafa; outline: none;}
        select:focus { border-color: var(--primary); background: #fff;}
        .qty-control { display: flex; align-items: center; gap: 15px; }
        .qty-btn { width: 45px; height: 45px; border-radius: 10px; border: 1.5px solid #ddd; background: #fff; font-size: 20px; cursor: pointer; color: #555;}
        .btn-add { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .btn-add:disabled { background: #ccc; cursor: not-allowed; }
        .btn-share-line { width: 100%; padding: 16px; background: #06C755; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; transition: 0.3s;}
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回賣場</a>
        <img id="img" src="" onerror="this.src='https://placehold.co/400x400?text=Belita'">
        <h1 id="name">載入中...</h1>
        <div class="price" id="price">NT$ 0</div>
        <div class="stock-tag" id="stock-display">狀態確認中...</div>

        <div class="form-group" id="spec-group" style="display: none;">
            <label>選擇規格</label>
            <select id="spec-select"></select>
        </div>
        
        <div class="form-group">
            <label>購買數量</label>
            <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <input type="number" id="qty" value="1" readonly style="width:50px; text-align:center; border:none; font-size:18px; font-weight:bold; background:transparent; outline:none;">
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
        </div>

        <button class="btn-add" id="add-btn" onclick="addToCart()">🛒 加入購物車</button>
        <button class="btn-share-line" onclick="shareToLine()">💬 分享給 LINE 好友</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pName = params.get('name') || '未知商品';
        const pPrice = parseInt(params.get('price')) || 0;
        const pStock = parseInt(params.get('stock')) || 0;
        const pSpecs = params.get('specs') || '';
        
        let currentPrice = pPrice; let currentStock = pStock; let specData = {};

        document.getElementById('name').innerText = pName;
        document.getElementById('img').src = params.get('img');

        if (pSpecs && pSpecs !== 'null' && pSpecs !== 'undefined') {
            const select = document.getElementById('spec-select');
            document.getElementById('spec-group').style.display = 'block';
            
            pSpecs.split(',').forEach(item => {
                const parts = item.split(':');
                if(parts[0]) {
                    const name = parts[0];
                    const price = parts[1] ? parseInt(parts[1]) : pPrice;
                    const stock = parts[2] ? parseInt(parts[2]) : 0;
                    specData[name] = { price, stock };
                    select.add(new Option(name, name));
                }
            });

            if(select.options.length > 0) {
                select.onchange = () => { const data = specData[select.value]; updateDisplay(data.price, data.stock); };
                updateDisplay(specData[select.value].price, specData[select.value].stock);
            }
        } else {
            updateDisplay(pPrice, pStock);
        }

        function updateDisplay(price, stock) {
            currentPrice = price; currentStock = stock;
            document.getElementById('price').innerText = `NT$ ${price}`;
            const display = document.getElementById('stock-display'); const btn = document.getElementById('add-btn');
            
            if (stock <= 0) {
                display.innerHTML = '<span style="color:#d32f2f;">❌ 此款式已售完</span>';
                btn.disabled = true; btn.innerText = '暫時售完';
            } else {
                display.innerText = `📦 剩餘現貨：${stock}`;
                btn.disabled = false; btn.innerText = '🛒 加入購物車';
            }
            document.getElementById('qty').value = 1;
        }

        function changeQty(n) {
            const input = document.getElementById('qty'); let val = parseInt(input.value) + n;
            if(val >= 1 && val <= currentStock) input.value = val;
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('belita_cart') || '[]');
            let qty = parseInt(document.getElementById('qty').value);
            let specName = document.getElementById('spec-group').style.display !== 'none' ? document.getElementById('spec-select').value : '';
            
            cart.push({ name: pName, price: currentPrice, img: params.get('img'), spec: specName, qty: qty });
            localStorage.setItem('belita_cart', JSON.stringify(cart));
            alert('🛒 已成功加入購物車！'); window.location.href = 'index.html';
        }

        function shareToLine() {
            const url = window.location.href;
            const msg = `✨ 快來看看這款好物：\n【${pName}】只要 NT$ ${currentPrice}！\n\n👇 點擊下方連結直接看商品 👇\n${url}`;
            window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
