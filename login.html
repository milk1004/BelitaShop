<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belita | 會員登入</title>
    <style>
        :root { --primary-color: #8b7355; --bg-gradient: linear-gradient(135deg, #fdf6f0 0%, #faf8f5 100%); --text-main: #4a4a4a; }
        * { box-sizing: border-box; font-family: 'PingFang TC', sans-serif; }
        body { margin: 0; background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); }
        .card { background: #fff; padding: 50px 40px; border-radius: 24px; width: 90%; max-width: 420px; box-shadow: 0 15px 35px rgba(139,115,85,0.08); position: relative; text-align: center; overflow: hidden; }
        .card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--primary-color); }
        .title { color: var(--primary-color); font-size: 28px; font-weight: 900; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; color: #999; }
        input { width: 100%; padding: 14px 18px; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; outline: none; background: #fafafa; }
        input:focus { border-color: var(--primary-color); background: #fff; }
        .btn { width: 100%; padding: 16px; background: var(--primary-color); color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .footer-text { margin-top: 30px; font-size: 14px; color: #888; }
        .footer-text a { color: var(--primary-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">Belita 會員登入</div>
        <form id="loginForm">
            <div class="form-group">
                <label>社群暱稱</label>
                <input type="text" id="social" required>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="pw" required>
            </div>
            <button type="submit" class="btn" id="btn">登入</button>
        </form>
        <div class="footer-text">還沒有帳號嗎？ <a href="register.html">立即註冊</a></div>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbynMF3m45iQKEsBtIaruJ1XVFq-t2kFUdvMiycw_oVOjFpxxmfrPyTccQ6pxTNz2cuR8g/exec'; 
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true; btn.innerText = '驗證中...';

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "login",
                        socialName: document.getElementById('social').value,
                        password: document.getElementById('pw').value
                    })
                });
                const result = await response.json();
                if (result.result === 'success') {
                    localStorage.setItem('belita_user', result.socialName);
                    localStorage.setItem('belita_line', result.lineName);
                    window.location.href = 'index.html';
                } else {
                    alert('❌ 登入失敗：' + (result.message || '帳號或密碼錯誤'));
                    btn.disabled = false; btn.innerText = '登入';
                }
            } catch (err) { alert('連線異常'); btn.disabled = false; btn.innerText = '登入'; }
        });
    </script>
</body>
</html>
